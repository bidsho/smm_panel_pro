{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Panel Pro | Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --dark-bg: #1a1a2e;
            --card-bg: #16213e;
            --text-light: #e9ecef;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .brand-logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .login-box h2 {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 30px;
            color: #888;
        }

        .form-label {
            color: #ccc;
            font-size: 0.9rem;
        }

        .form-control {
            background-color: #0f3460;
            border: 1px solid #16213e;
            color: white;
            padding: 12px;
            border-radius: 8px;
        }

        .form-control:focus {
            background-color: #0f3460;
            border-color: var(--primary-color);
            color: white;
            box-shadow: none;
        }

        .btn-login {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #5b4bc4;
            transform: translateY(-2px);
        }

        .forgot-link {
            font-size: 0.85rem;
            color: #888;
            text-decoration: none;
            float: right;
            margin-top: 5px;
        }

        .forgot-link:hover {
            color: var(--primary-color);
        }

        /* Django Messages Styling */
        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            border: none;
            animation: shake 0.5s;
        }

        .alert-error, .alert-danger {
            background-color: #e74c3c;
            color: white;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .signup-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #888;
        }

        .signup-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <div class="brand-logo">SMM PANEL PRO</div>
        <h2>Access Your Dashboard</h2>
        
        <!-- Django Messages Handling -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            
            <div class="mb-2">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <a href="{% url 'forgot_password' %}" class="forgot-link">Forgot Password?</a>

            <button type="submit" class="btn-login">Login to Account</button>
        </form>

        <div class="signup-footer">
            Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
