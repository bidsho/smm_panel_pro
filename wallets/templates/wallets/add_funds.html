{% extends "layouts/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-4" style="border-radius: 15px;">
            <h4 class="fw-bold mb-3"><i class="fas fa-plus-circle text-primary me-2"></i> Deposit Funds</h4>
            <p class="text-muted small">Funds will be added to your balance instantly after payment.</p>
            
            <div class="mb-4">
                <label class="form-label fw-bold">Amount to Deposit (₦)</label>
                <input type="number" id="amount" class="form-control form-control-lg" placeholder="e.g. 5000" min="100">
            </div>

            <button type="button" onclick="payWithPaystack()" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
                Proceed to Pay
            </button>
        </div>
    </div>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
    function payWithPaystack() {
        const amount = document.getElementById('amount').value;
        if (amount < 100) {
            alert("Minimum deposit is ₦100");
            return;
        }

        const handler = PaystackPop.setup({
            key: '{{ paystack_public_key }}',
            email: '{{ request.user.email }}',
            amount: amount * 100, // Amount in Kobo
            currency: "NGN",
            ref: 'SMM-' + Math.floor((Math.random() * 1000000000) + 1),
            callback: function(response) {
                // Change UI to show loading
                document.querySelector('.card').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div><h5 class="mt-3">Verifying Transaction...</h5></div>';
                // Redirect to the verification URL
                window.location.href = "/wallets/verify/" + response.reference + "/";
            },
            onClose: function() {
                alert('Transaction was not completed.');
            }
        });
        handler.openIframe();
    }
</script>
{% endblock %}
