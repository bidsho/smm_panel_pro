{% extends "admin/change_list.html" %}
{% load i18n %}

{% block content_title %}
    <h1>Select order to change</h1>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; margin-top: 20px;">
        
        <div style="background: #2d3436; color: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin: 0; font-size: 14px; opacity: 0.8; color: #dfe6e9;">JAP Provider Balance</h3>
            <h2 style="margin: 10px 0 0 0; color: #55efc4;">${{ jap_balance }}</h2>
            <small>Top up when below $10</small>
        </div>

        <div style="background: #6c5ce7; color: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin: 0; font-size: 14px; opacity: 0.8;">Total Revenue</h3>
            <h2 style="margin: 10px 0 0 0;">₦{{ total_sales }}</h2>
            <small>Completed orders only</small>
        </div>

        <div style="background: #00b894; color: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin: 0; font-size: 14px; opacity: 0.8;">Total Customers</h3>
            <h2 style="margin: 10px 0 0 0;">{{ total_users }}</h2>
            <small>Registered users</small>
        </div>

    </div>
{% endblock %}
