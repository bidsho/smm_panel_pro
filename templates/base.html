<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NairaBoost - Nigeria's #1 SMM Panel{% endblock %}</title>
  

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    body{ background:#0b0f17; color:#e8eefc; }
    .hero{
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(13,110,253,.35), transparent 60%),
        radial-gradient(800px 500px at 90% 30%, rgba(102,16,242,.28), transparent 55%),
        linear-gradient(180deg, #0b0f17 0%, #0b0f17 100%);
    }
    .glass{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
    }
    .badge-tech{ border:1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06); }
    .btn-soft{ background: rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18); color:#fff; }
    .btn-soft:hover{ background: rgba(255,255,255,.16); }
  </style>
</head>

<body class="hero">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark py-3">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'index' %}">ExPine</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto gap-lg-3">
          <li class="nav-item"><a class="nav-link" href="#services">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="#training">Training</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
        </ul>

        <div class="ms-lg-3 d-grid d-lg-block gap-2">
          <a class="btn btn-soft rounded-pill px-4" href="{% url 'login' %}">Login</a>
          
          
        </div>
      </div>
    </div>
  </nav>

<main class="py-5">
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</main>

<!-- Contact -->
  <section id="contact" class="py-5">
    <div class="container">
      <div class="glass rounded-4 p-4 p-md-5">
        <div class="row align-items-center g-4">
          <div class="col-lg-7">
            <h3 class="fw-bold mb-2">Ready to start?</h3>
            <p class="text-white-50 mb-0">
              Contact ExPine on WhatsApp and let’s ship your goods.
            </p>
          </div>
          <div class="col-lg-5 text-lg-end">
            <a class="btn btn-success btn-lg rounded-pill px-4"
               href="https://wa.me/2348151125562" target="_blank">
              <i class="bi bi-whatsapp"></i> Chat on WhatsApp
            </a>
          </div>
        </div>
      </div>

      <div class="text-center text-white-50 small mt-4">
        © {% now "Y" %} ExPine. All rights reserved.
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
