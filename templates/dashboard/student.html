{% extends "layouts/student.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
        <!-- Content Area -->
        
           

            <!-- Stats Row -->
            <div class="row g-4 mb-5">
                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="card stat-card p-4">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-primary-subtle text-primary">
                                <i class="fas fa-wallet fs-4"></i>
                            </div>
                            <div class="ms-3">
                                <p class="text-muted mb-0 small uppercase">Wallet Balance</p>
                                <h3 class="fw-bold mb-0">${{ wallet.balance|default:"0.00" }}</h3>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="card stat-card p-4">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-success-subtle text-success">
                                <i class="fas fa-check-circle fs-4"></i>
                            </div>
                            <div class="ms-3">
                                <p class="text-muted mb-0 small">Attendance</p>
                                <h3 class="fw-bold mb-0">94%</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="card stat-card p-4">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-warning-subtle text-warning">
                                <i class="fas fa-star fs-4"></i>
                            </div>
                            <div class="ms-3">
                                <p class="text-muted mb-0 small">Avg. Grade</p>
                                <h3 class="fw-bold mb-0">A-</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content Placeholder -->
            <div class="row">
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold">My Study Materials</h4>
                        <button class="btn btn-primary btn-sm rounded-pill px-4">View All</button>
                    </div>
                    
                    <div class="file-grid">
                        <!-- This is where your file loop goes -->
                        <div class="text-center p-5 bg-white rounded-4 border border-dashed w-100">
                           <p class="text-muted">Study materials will appear here once uploaded by teachers.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    {% endblock %}
