<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Scala School</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
     <!-- FontAwesome 6.4.0 (Latest) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/all.min.css">
    
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-dark: #1e293b;
            --accent-color: #3b82f6;
            --bg-light: #f1f5f9;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- SIDEBAR STYLES --- */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: var(--primary-dark);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1050;
        }

        #sidebar.collapsed {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        .nav-link {
            color: #94a3b8;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 15px;
            transition: 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* --- CONTENT AREA --- */
        #content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 30px;
            transition: all 0.3s;
        }

        #content.expanded {
            margin-left: 0;
            width: 100%;
        }

        /* --- CARDS & UI --- */
        .stat-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 991.98px) {
            #sidebar {
                margin-left: calc(-1 * var(--sidebar-width));
            }
            #sidebar.active {
                margin-left: 0;
            }
            #content {
                margin-left: 0;
                width: 100%;
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                width: 100vw;
                height: 100vh;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1040;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }

        /* File Grid Styles */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>

    <!-- Overlay for Mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="d-flex">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="p-4">
                <h4 class="fw-bold"><i class="fas fa-graduation-cap me-2 text-primary"></i>Scala School</h4>
            </div>
            <ul class="nav flex-column mt-2">
                <li class="nav-item">
                    <a href="{% url 'student_dashboard' %}" class="nav-link active">
                        <i class="fas fa-th-large me-3"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'student_profile' %}" class="nav-link">
                        <i class="fas fa-wallet me-3"></i>Profile
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'mark_attendance' %}" class="nav-link">
                        <i class="fas fa-wallet me-3"></i>Attendance
                    </a>
                </li>
                <li class="nav-item">
                    <a href="" class="nav-link">
                        <i class="fas fa-book-open me-3"></i>Courses
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <i class="fas fa-calendar-check me-3"></i>Attendance
                    </a>
                </li>
                <li class="nav-item mt-5">
                    <hr class="mx-3 text-secondary">
                    <a href="{% url 'logout' %}" class="nav-link text-danger">
                        <i class="fas fa-sign-out-alt me-3"></i>Logout
                    </a>
                </li>
            </ul>
        </nav>
         <!-- Top Navbar -->
          <div id="content">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div class="d-flex align-items-center">
                    <button class="btn btn-white shadow-sm me-3 border" id="sidebarToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h3 class="mb-0 fw-semibold">Dashboard</h3>
                </div>
                
                <div class="d-flex align-items-center">
                    <div class="text-end me-3 d-none d-md-block">
                        <p class="mb-0 fw-bold">{{ request.user.username }}</p>
                        <small class="text-muted">ID: {{ student.student_id|default:"N/A" }}</small>
                    </div>
                    <img src="https://ui-avatars.com/api/?name={{ request.user.username }}&background=0D6EFD&color=fff" 
                         class="rounded-circle shadow-sm" width="45" alt="Profile">
                </div>
            </header>



     <!-- PAGE CONTENT -->

{% block content %}

{% endblock %}


        <!-- JS Logic for Toggle -->
    <script>
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');
        const overlay = document.getElementById('sidebarOverlay');
        const toggleBtn = document.getElementById('sidebarToggle');

        toggleBtn.addEventListener('click', () => {
            const isMobile = window.innerWidth < 992;
            
            if (isMobile) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            } else {
                sidebar.classList.toggle('collapsed');
                content.classList.toggle('expanded');
            }
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        });

        // Close sidebar on window resize if scaling up to desktop
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 992) {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            }
        });
    </script>
</body>
</html>
